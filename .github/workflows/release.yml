name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # macos-15 ships a far newer Swift than macos-14's 5.10, whose older
    # type-checker rejected code the local toolchain accepts (ambiguous
    # cos/sin overloads, expression type-check timeouts). Keep this runner in
    # step with the dev toolchain or CI-only build breaks come back.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | sed -nE 's/.*"(Developer ID Application[^"]+)".*/\1/p' | head -1)"
          [ -n "$IDENTITY" ] || { echo "no Developer ID identity found"; exit 1; }
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
      # Notarization credentials go straight to the build as env — Scripts/
      # notarize.sh writes the key to a temp file itself and shreds it on
      # exit, so the .p8 never lands anywhere the workspace can leak it.
      # ASC_KEY_P8 is the key's raw contents (a multi-line secret), not base64.
      - name: Build Sharingan.dmg
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: Scripts/make-dmg.sh
      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## \[/{ if (found) exit; found=1; next } found' CHANGELOG.md > /tmp/notes.md
          cat /tmp/notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sharingan.dmg
          body_path: /tmp/notes.md
          name: Sharingan ${{ github.ref_name }}
      # The tag checkout is detached; checking out main and pushing the
      # one-file commit is safe because the release job runs alone on tags.
      # Pages redeploys on the push.
      - name: Update appcast on main
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD="$(plutil -extract CFBundleVersion raw dist/Sharingan.app/Contents/Info.plist)"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Sharingan.dmg"
          git fetch origin main && git checkout main
          Scripts/update-appcast.sh dist/Sharingan.dmg "$VERSION" "$BUILD" "$URL" /tmp/notes.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/appcast.xml
          git commit -m "chore(appcast): Sharingan $VERSION"
          git push origin main
