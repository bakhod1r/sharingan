name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # macos-15 ships a far newer Swift than macos-14's 5.10, whose older
    # type-checker rejected code the local toolchain accepts (ambiguous
    # cos/sin overloads, expression type-check timeouts). Keep this runner in
    # step with the dev toolchain or CI-only build breaks come back.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build Sharingan.dmg
        run: Scripts/make-dmg.sh
      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## \[/{ if (found) exit; found=1; next } found' CHANGELOG.md > /tmp/notes.md
          cat /tmp/notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sharingan.dmg
          body_path: /tmp/notes.md
          name: Sharingan ${{ github.ref_name }}
