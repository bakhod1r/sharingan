name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: write

jobs:
  release:
    # macos-15 ships a far newer Swift than macos-14's 5.10, whose older
    # type-checker rejected code the local toolchain accepts (ambiguous
    # cos/sin overloads, expression type-check timeouts). Keep this runner in
    # step with the dev toolchain or CI-only build breaks come back.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          # Scripts/make-app.sh stamps CFBundleVersion from
          # `git rev-list --count HEAD`, which needs full history — a shallow
          # (default depth-1) checkout would stamp every build "1" and the
          # published appcast would never advance past sparkle:version=1.
          fetch-depth: 0
      - name: Show toolchain
        run: swift --version
      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERT_P12" ]]; then
            echo "no signing secrets — building unsigned (fork or pre-setup)"
            exit 0
          fi
          KEYCHAIN=build.keychain
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | sed -nE 's/.*"(Developer ID Application[^"]+)".*/\1/p' | head -1)"
          [ -n "$IDENTITY" ] || { echo "no Developer ID identity found"; exit 1; }
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
      # iCloud entitlements only survive signing when the build embeds a
      # provisioning profile — without the secret, make-app.sh falls back to
      # App-NoCloud.entitlements and the release simply ships without sync.
      - name: Stage provisioning profile
        env:
          PROVISION_PROFILE: ${{ secrets.PROVISION_PROFILE }}
        run: |
          if [[ -z "$PROVISION_PROFILE" ]]; then
            echo "no PROVISION_PROFILE secret — building without iCloud entitlements"
            exit 0
          fi
          echo "$PROVISION_PROFILE" | base64 --decode > "$RUNNER_TEMP/sharingan.provisionprofile"
          echo "PROVISION_PROFILE_FILE=$RUNNER_TEMP/sharingan.provisionprofile" >> "$GITHUB_ENV"
      # Notarization credentials go straight to the build as env — Scripts/
      # notarize.sh writes the key to a temp file itself and shreds it on
      # exit, so the .p8 never lands anywhere the workspace can leak it.
      # ASC_KEY_P8 is the key's raw contents (a multi-line secret), not base64.
      - name: Build Sharingan.dmg
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: Scripts/make-dmg.sh
      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
      - name: Extract release notes from CHANGELOG
        run: |
          awk '/^## \[/{ if (found) exit; found=1; next } found' CHANGELOG.md > /tmp/notes.md
          cat /tmp/notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Sharingan.dmg
          body_path: /tmp/notes.md
          name: Sharingan ${{ github.ref_name }}
      # The tag checkout is detached; checking out main and pushing the
      # one-file commit is safe because the release job runs alone on tags.
      # A push made with the workflow's GITHUB_TOKEN does NOT trigger other
      # push-event workflows, so pages.yml would never redeploy on its own —
      # the appcast dispatch below kicks it explicitly.
      - name: Update appcast on main
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -z "$SPARKLE_ED_PRIVATE_KEY" ]]; then
            echo "no SPARKLE_ED_PRIVATE_KEY — skipping appcast update"
            exit 0
          fi
          # The feed, the Pages site, the release asset and this appcast commit
          # must all live in ONE repo. Cut a release from a fork or a mirror and
          # the appcast lands somewhere Pages never serves — every installed
          # copy then silently 404s on update, and nobody finds out for months.
          FEED="$(plutil -extract SUFeedURL raw Resources/Info.plist)"
          FEED_REPO="$(sed -nE 's|https://([^.]+)\.github\.io/([^/]+)/.*|\1/\2|p' <<<"$FEED")"
          if [[ "$FEED_REPO" != "$GITHUB_REPOSITORY" ]]; then
            echo "✗ SUFeedURL ($FEED) is served by '$FEED_REPO', but this release is being cut in '$GITHUB_REPOSITORY'." >&2
            echo "  Publishing here would leave the appcast where Pages never serves it. Tag the release in $FEED_REPO instead." >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD="$(plutil -extract CFBundleVersion raw dist/Sharingan.app/Contents/Info.plist)"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Sharingan.dmg"
          git fetch origin main && git checkout main
          Scripts/update-appcast.sh dist/Sharingan.dmg "$VERSION" "$BUILD" "$URL" /tmp/notes.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/appcast.xml
          git commit -m "chore(appcast): Sharingan $VERSION"
          git push origin main
          gh workflow run pages.yml --ref main
